name: Send Hot Topic Copywriting

on:
  schedule:
    - cron: '15 23 * * *'   # 07:15 China Standard Time

jobs:
  send-hot-topics:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.CODEX_SMTP_HOST || secrets.GMAIL_HOST || secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.CODEX_SMTP_PORT || secrets.GMAIL_PORT || secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.CODEX_SMTP_USERNAME || secrets.GMAIL_USERNAME || secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.CODEX_SMTP_PASSWORD || secrets.GMAIL_PASSWORD || secrets.SMTP_PASSWORD }}
      SMTP_FROM_NAME: ${{ secrets.CODEX_SMTP_FROM_NAME || secrets.GMAIL_FROM_NAME || secrets.SMTP_FROM_NAME }}
      SMTP_RECIPIENTS: ${{ secrets.CODEX_SMTP_RECIPIENTS || secrets.GMAIL_RECIPIENTS || secrets.SMTP_RECIPIENTS }}
      SMTP_SUBJECT_PREFIX: ${{ secrets.CODEX_SMTP_SUBJECT_PREFIX || secrets.GMAIL_SUBJECT_PREFIX || secrets.SMTP_SUBJECT_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore hot-topic rotation state
        uses: actions/cache@v4
        with:
          path: .hot_topics_digest_state_pyq-hot-topics-rotation
          key: hot-topics-digest-${{ github.run_id }}
          restore-keys: |
            hot-topics-digest-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Send hot topic digest
        env:
          HOT_TOPICS_SOURCE: ./pyq-hot-topics-rotation.md
          HOT_TOPICS_START_INDEX: 0
        run: python send_hot_topics_digest.py --count 3 --subject-prefix "9:30热点选题"
