name: Send Copywriting Email

on:
  schedule:
    - cron: '5 23 * * *'   # 07:05 China Standard Time
  workflow_dispatch:

jobs:
  send-copywriting:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore copywriting rotation state
        uses: actions/cache@v4
        with:
          path: .copywriting_digest_state_v2
          key: copywriting-digest-${{ github.run_id }}
          restore-keys: |
            copywriting-digest-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Send copywriting digest
        env:
          COPYWRITING_MARKDOWN_PATH: project-copywriting-2025-12-11.md
          COPYWRITING_STATE_PATH: .copywriting_digest_state_v2
        run: python send_copywriting_digest.py --subject-prefix "10:20自动播报"
